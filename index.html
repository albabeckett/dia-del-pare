<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Interactivo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="envelope" id="envelope" onclick="toggleEnvelope()">
            <div class="stamp">💌</div>
            <div class="flap"></div>
            <div class="pocket"></div>
            <div class="letter">
                <img src="felicitacio.jpg" alt="Moltes felicitats">
            </div>
        </div>
        <div class="instruction" id="instruction">Fes clic per obrir el sobre</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
